services:

  # ── MySQL 資料庫 ──────────────────────────────────
  db:
    image: mysql:8.0
    container_name: sensei_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Flask 後端 ────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: sensei_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "9453:9453"
    depends_on:
      db:
        condition: service_healthy

  # ── React 前端（Nginx）────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: sensei_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
